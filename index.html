<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contadores Star Wars Tycoon</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgba(10, 10, 10, 0.85);
            color: #ffffff;
            margin: 10px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-start;
            user-select: none;
        }

        .timers-container {
            width: 250px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
            padding: 10px;
            background: rgba(15, 15, 15, 0.9);
        }

        .timer-box {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .beskar { 
            background: rgba(212, 175, 55, 0.25); 
            border: 2px solid #ffd700; 
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
            color: #fff8dc;
        }
        .mythic { 
            background: rgba(220, 20, 60, 0.3); 
            border: 2px solid #ff1493; 
            box-shadow: 0 0 8px rgba(255, 20, 147, 0.4);
            color: #ffe4e1;
        }
        .galactic { 
            background: rgba(138, 43, 226, 0.35); 
            border: 2px solid #a855f7; 
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.4);
            color: #f3e8ff;
        }

        .time-display {
            font-size: 16px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        button {
            background: #111;
            color: #fff;
            border: 1px solid #777;
            border-radius: 5px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { 
            background: #fff; 
            color: #000;
        }

        /* Sección del Evento al lado */
        .event-box {
            width: 250px;
            background: rgba(138, 43, 226, 0.15);
            border: 2px solid #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
        }

        .event-title {
            font-weight: bold;
            color: #c084fc;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .event-list {
            list-style: none;
            padding: 0;
            margin: 0 0 10px 0;
            line-height: 1.5;
        }

        .event-date {
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px;
            border-radius: 5px;
            color: #cbd5e1;
            border-left: 2px solid #a855f7;
        }
    </style>
</head>
<body>

    <!-- Bloque Original de Contadores -->
    <div class="timers-container">
        <div class="timer-box beskar">
            <div>Beskar<br><span id="beskar-display" class="time-display">00:15:00</span></div>
            <button onclick="resetTimer('beskar', 900)">Reset</button>
        </div>

        <div class="timer-box mythic">
            <div>Mítico<br><span id="mythic-display" class="time-display">01:00:00</span></div>
            <button onclick="resetTimer('mythic', 3600)">Reset</button>
        </div>

        <div class="timer-box galactic">
            <div>Galáctico<br><span id="galactic-display" class="time-display">01:00:00</span></div>
            <button onclick="resetTimer('galactic', 3600)">Reset</button>
        </div>
    </div>

    <!-- Info del Evento al lado -->
    <div class="event-box">
        <div class="event-title">🌌 EVENTO GALÁCTICO</div>
        <ul class="event-list">
            <li>📦 Planos galácticos en el Sandcrawler</li>
            <li>⛏️ Nivel de pico x2</li>
            <li>⚡ Velocidad de fabricación x2</li>
            <li>💎 Cristales Nova</li>
        </ul>
        <div class="event-date">
            📅 Sábado 25 de julio, 14:00<br>
            🏁 Domingo 26 de julio, 14:00
        </div>
    </div>

    <script>
        const timers = {
            beskar: 900,
            mythic: 3600,
            galactic: 3600
        };

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            document.getElementById('beskar-display').innerText = formatTime(timers.beskar);
            document.getElementById('mythic-display').innerText = formatTime(timers.mythic);
            document.getElementById('galactic-display').innerText = formatTime(timers.galactic);
        }

        function resetTimer(type, defaultSeconds) {
            timers[type] = defaultSeconds;
            updateDisplay();
        }

        setInterval(() => {
            for (let key in timers) {
                if (timers[key] > 0) {
                    timers[key]--;
                }
            }
            updateDisplay();
        }, 1000);

        updateDisplay();
    </script>
</body>
</html>
