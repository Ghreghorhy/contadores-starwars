<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Tycoon Star Wars - Timers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: #05070b url('https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            user-select: none;
        }

        /* Overlay oscuro sobre el fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 7, 11, 0.88);
            z-index: -1;
        }

        /* Header del Creador Grande */
        .creator-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .creator-bar strong { color: #00d2ff; font-size: 17px; }
        
        .creator-bar .code {
            color: #ff0055;
            background: rgba(255, 0, 85, 0.2);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #ff0055;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* Botón de PayPal */
        .paypal-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #0070ba, #003087);
            color: #ffffff;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            border: 1px solid #00a6ff;
            box-shadow: 0 0 15px rgba(0, 112, 186, 0.4);
            transition: all 0.3s ease;
        }

        .paypal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 166, 255, 0.8);
            background: linear-gradient(135deg, #0088e8, #0040b3);
        }

        /* Titulo XL */
        .welcome-title {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #ffe600, #ff0055, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
            text-shadow: 0 0 30px rgba(255, 230, 0, 0.3);
        }

        /* Contenedor Gigante */
        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        /* Tarjeta de Contador XL */
        .timer-box {
            padding: 25px 35px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            border: 2px solid;
            position: relative;
        }

        .timer-box:hover {
            transform: translateY(-3px);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-title {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .time-display {
            font-size: 52px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            letter-spacing: 4px;
            text-shadow: 0 0 15px currentColor;
        }

        .status-badge {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            display: none;
            color: #ff2a2a;
            text-transform: uppercase;
        }

        /* Colores Neón Personalizados */
        .beskar { 
            background: rgba(212, 175, 55, 0.08); 
            border-color: #ffd700; 
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            color: #fff3a1;
        }
        .mythic { 
            background: rgba(220, 20, 60, 0.08); 
            border-color: #ff1493; 
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.2);
            color: #ffb6c1;
        }
        .galactic { 
            background: rgba(138, 43, 226, 0.08); 
            border-color: #a855f7; 
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.2);
            color: #e9d5ff;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        button {
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 12px;
            padding: 14px 22px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        button:hover { 
            background: #ffffff; 
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        .btn-pip {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        canvas { display: none; }

        @keyframes readyPulse {
            0% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
            100% { border-color: #ffffff; box-shadow: 0 0 50px #ff0000; }
        }

        .ready-alert {
            animation: readyPulse 0.8s infinite alternate !important;
        }

        @media (max-width: 600px) {
            .time-display { font-size: 36px; }
            .welcome-title { font-size: 22px; }
            .creator-bar { flex-direction: column; text-align: center; justify-content: center; }
            .timer-box { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Barra de Creador + Donaciones -->
    <div class="creator-bar">
        <span>CREADOR: <strong>GREGORY</strong></span>
        <span>CÓDIGO FORTNITE: <span class="code">GREGORY9797</span></span>
        
        <!-- Enlace de Donación configurado con tu correo lordkellvnzl@gmail.com -->
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=lordkellvnzl@gmail.com&item_name=Apoyo+a+Gregory+Star+Wars+Tycoon&currency_code=USD" target="_blank" class="paypal-btn">
            💙 Apoyar / Donar
        </a>
    </div>

    <!-- Título de Bienvenida -->
    <div class="welcome-title">
        ¡BIENVENIDO ANDROID TYCOON STAR WARS!
    </div>

    <div class="container">
        <!-- Beskar -->
        <div id="box-beskar" class="timer-box beskar">
            <div class="card-info">
                <div class="card-title">Beskar</div>
                <div id="beskar-display" class="time-display">00:15:00</div>
                <div id="beskar-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <div class="action-buttons">
                <button class="btn-pip" onclick="togglePiP('beskar', 'BESKAR')">📌 Flotante</button>
                <button onclick="resetTimer('beskar', 900)">Reset</button>
            </div>
        </div>

        <!-- Mítico -->
        <div id="box-mythic" class="timer-box mythic">
            <div class="card-info">
                <div class="card-title">Mítico</div>
                <div id="mythic-display" class="time-display">01:00:00</div>
                <div id="mythic-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <div class="action-buttons">
                <button class="btn-pip" onclick="togglePiP('mythic', 'MÍTICO')">📌 Flotante</button>
                <button onclick="resetTimer('mythic', 3600)">Reset</button>
            </div>
        </div>

        <!-- Galáctico -->
        <div id="box-galactic" class="timer-box galactic">
            <div class="card-info">
                <div class="card-title">Galáctico</div>
                <div id="galactic-display" class="time-display">01:00:00</div>
                <div id="galactic-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <div class="action-buttons">
                <button class="btn-pip" onclick="togglePiP('galactic', 'GALÁCTICO')">📌 Flotante</button>
                <button onclick="resetTimer('galactic', 3600)">Reset</button>
            </div>
        </div>
    </div>

    <canvas id="pipCanvas" width="400" height="200"></canvas>
    <video id="pipVideo" autoplay muted style="display:none;"></video>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const ADMIN_PIN = "HOLAGORDIS69KELL$$"; 

        const firebaseConfig = {
            apiKey: "AIzaSyDSQtr6xQONdpcK7HQDe_TIVCm6yBg4C3E",
            authDomain: "starwars-timers.firebaseapp.com",
            projectId: "starwars-timers",
            storageBucket: "starwars-timers.firebasestorage.app",
            messagingSenderId: "823447387092",
            appId: "1:823447387092:web:c98ee916a04d00eee83441"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let serverOffset = 0;
        let activePipType = null;
        let activePipTitle = "";

        db.collection(".info").doc("serverTime").set({ now: firebase.firestore.FieldValue.serverTimestamp() })
            .then(() => {
                db.collection(".info").doc("serverTime").get().then((doc) => {
                    if (doc.exists && doc.data().now) {
                        const serverTime = doc.data().now.toMillis();
                        serverOffset = serverTime - Date.now();
                    }
                });
            }).catch(() => {});

        const targetTimes = { beskar: 0, mythic: 0, galactic: 0 };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 880) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function formatTime(seconds) {
            if (seconds <= 0) return "00:00:00";
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            const now = Date.now() + serverOffset;

            for (let key in targetTimes) {
                const display = document.getElementById(`${key}-display`);
                const box = document.getElementById(`box-${key}`);
                const status = document.getElementById(`${key}-status`);
                
                if (targetTimes[key] === 0) continue;

                const remainingSeconds = Math.max(0, Math.ceil((targetTimes[key] - now) / 1000));
                const formatted = formatTime(remainingSeconds);
                display.innerText = formatted;

                if (remainingSeconds === 0) {
                    box.classList.add('ready-alert');
                    status.style.display = 'block';
                } else if (remainingSeconds <= 5) {
                    playBeep(600);
                    box.classList.remove('ready-alert');
                    status.style.display = 'none';
                } else {
                    box.classList.remove('ready-alert');
                    status.style.display = 'none';
                }

                if (activePipType === key) {
                    renderCanvas(activePipTitle, formatted, remainingSeconds === 0);
                }
            }
        }

        const canvas = document.getElementById('pipCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');

        function renderCanvas(title, timeStr, isReady) {
            ctx.fillStyle = isReady ? "#990000" : "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00d2ff";
            ctx.font = "bold 22px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(title, canvas.width / 2, 45);

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 46px monospace";
            ctx.fillText(timeStr, canvas.width / 2, 115);

            ctx.fillStyle = isReady ? "#ffea00" : "#94a3b8";
            ctx.font = "bold 16px sans-serif";
            ctx.fillText(isReady ? "¡RESPAWN LISTO!" : "GREGORY9797", canvas.width / 2, 165);
        }

        async function togglePiP(type, title) {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    if (activePipType === type) {
                        activePipType = null;
                        return;
                    }
                }

                activePipType = type;
                activePipTitle = title;

                const stream = canvas.captureStream(30);
                video.srcObject = stream;
                await video.play();
                await video.requestPictureInPicture();

                video.addEventListener('leavepictureinpicture', () => {
                    activePipType = null;
                }, { once: true });

            } catch (err) {
                alert("Tu navegador no soporta el modo flotante. Prueba desde Chrome o Edge en PC.");
            }
        }

        db.collection("timers").doc("starwars").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.beskar) targetTimes.beskar = data.beskar;
                if (data.mythic) targetTimes.mythic = data.mythic;
                if (data.galactic) targetTimes.galactic = data.galactic;
                updateDisplay();
            }
        });

        function resetTimer(type, secondsDuration) {
            const userPin = prompt("Ingresa la clave de administrador:");
            if (userPin !== ADMIN_PIN) {
                alert("Clave incorrecta.");
                return;
            }

            const currentServerTime = Date.now() + serverOffset;
            const targetTimestamp = currentServerTime + (secondsDuration * 1000);
            
            db.collection("timers").doc("starwars").set({
                [type]: targetTimestamp
            }, { merge: true });
        }

        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
