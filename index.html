<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contadores Star Wars Tycoon</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            user-select: none;
        }

        h2 {
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e2e8f0;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }

        .timer-box {
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .time-display {
            font-size: 22px;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .beskar { 
            background: rgba(212, 175, 55, 0.15); 
            border: 2px solid #ffd700; 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            color: #fff8dc;
        }
        .mythic { 
            background: rgba(220, 20, 60, 0.15); 
            border: 2px solid #ff1493; 
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.2);
            color: #ffe4e1;
        }
        .galactic { 
            background: rgba(138, 43, 226, 0.15); 
            border: 2px solid #a855f7; 
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
            color: #f3e8ff;
        }

        .warning-alert {
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.02); filter: drop-shadow(0 0 15px red); }
        }

        button {
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        button:hover { 
            background: #cbd5e1; 
            color: #0f172a;
        }
    </style>
</head>
<body>

    <h2>Respawn Timers (En Vivo)</h2>

    <div class="container">
        <div id="box-beskar" class="timer-box beskar">
            <div>
                <div class="card-title">Beskar</div>
                <div id="beskar-display" class="time-display">00:15:00</div>
            </div>
            <button onclick="resetTimer('beskar', 900)">Reset</button>
        </div>

        <div id="box-mythic" class="timer-box mythic">
            <div>
                <div class="card-title">Mítico</div>
                <div id="mythic-display" class="time-display">01:00:00</div>
            </div>
            <button onclick="resetTimer('mythic', 3600)">Reset</button>
        </div>

        <div id="box-galactic" class="timer-box galactic">
            <div>
                <div class="card-title">Galáctico</div>
                <div id="galactic-display" class="time-display">01:00:00</div>
            </div>
            <button onclick="resetTimer('galactic', 3600)">Reset</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDSQtr6xQONdpcK7HQDe_TIVCm6yBg4C3E",
            authDomain: "starwars-timers.firebaseapp.com",
            projectId: "starwars-timers",
            storageBucket: "starwars-timers.firebasestorage.app",
            messagingSenderId: "823447387092",
            appId: "1:823447387092:web:c98ee916a04d00eee83441"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const targetTimes = {
            beskar: 0,
            mythic: 0,
            galactic: 0
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function formatTime(seconds) {
            if (seconds <= 0) return "00:00:00";
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            const now = Date.now();

            for (let key in targetTimes) {
                const display = document.getElementById(`${key}-display`);
                const box = document.getElementById(`box-${key}`);
                
                if (targetTimes[key] === 0) continue;

                const remainingSeconds = Math.max(0, Math.ceil((targetTimes[key] - now) / 1000));
                display.innerText = formatTime(remainingSeconds);

                if (remainingSeconds <= 5 && remainingSeconds > 0) {
                    box.classList.add('warning-alert');
                    playBeep();
                } else {
                    box.classList.remove('warning-alert');
                }
            }
        }

        // Sincronización en vivo con la base de datos
        db.collection("timers").doc("starwars").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.beskar) targetTimes.beskar = data.beskar;
                if (data.mythic) targetTimes.mythic = data.mythic;
                if (data.galactic) targetTimes.galactic = data.galactic;
                updateDisplay();
            } else {
                resetTimer('beskar', 900);
                resetTimer('mythic', 3600);
                resetTimer('galactic', 3600);
            }
        });

        function resetTimer(type, secondsDuration) {
            const targetTimestamp = Date.now() + (secondsDuration * 1000);
            
            db.collection("timers").doc("starwars").set({
                [type]: targetTimestamp
            }, { merge: true });
        }

        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
