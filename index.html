<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Fortnite - Contadores</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: #05070b url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            user-select: none;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 7, 11, 0.7);
            z-index: -1;
        }

        .creator-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 25px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .creator-bar strong { color: #00d2ff; }
        
        .creator-bar .code {
            color: #ff0055;
            background: rgba(255, 0, 85, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #ff0055;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #ffffff;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,30%);
            transition: transform 0.2s;
        }

        .btn-social:hover { transform: scale(1.05); }
        .instagram-btn { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
        .paypal-btn { background: linear-gradient(135deg, #0070ba, #003087); }

        /* Pestañas de Navegación originales */
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #475569;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            border-color: #00d2ff;
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00d2ff, #0072ff);
            border-color: #00d2ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .event-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: auto 0;
            text-align: center;
        }

        .event-banner {
            background: rgba(20, 10, 35, 0.85);
            border: 2px solid #a855f7;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6), inset 0 0 15px rgba(168, 85, 247, 0.4);
            backdrop-filter: blur(10px);
        }

        .event-subtitle {
            font-size: 13px;
            letter-spacing: 4px;
            font-weight: 900;
            color: #e9d5ff;
            text-transform: uppercase;
        }

        .event-title {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #d8b4fe, #f472b6, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .countdown-box {
            background: rgba(10, 14, 26, 0.92);
            border: 3px solid #ffe600;
            border-radius: 20px;
            padding: 20px 30px;
            box-shadow: 0 0 40px rgba(255, 230, 0, 0.4);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 380px;
        }

        #phase-indicator {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00d2ff;
            text-transform: uppercase;
            background: rgba(0, 210, 255, 0.1);
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }

        .time-digits {
            font-size: 46px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            color: #ffe600;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 230, 0, 0.6);
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            font-weight: 900;
            color: #94a3b8;
            letter-spacing: 2px;
            padding: 0 10px;
            text-transform: uppercase;
        }

        .btn-config {
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-config:hover {
            background: #ffe600;
            color: #000;
            border-color: #ffe600;
        }

        .admin-panel {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            border: 1px dashed #00d2ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            width: 100%;
            flex-direction: column;
            gap: 12px;
        }

        .admin-panel.active { display: flex; }

        .inputs-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
        }

        .inputs-row input {
            width: 50px;
            padding: 6px;
            background: #0f172a;
            border: 1px solid #00d2ff;
            color: #fff;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
        }

        .admin-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-save { background: #00c853; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 900; cursor: pointer; }
        .btn-cancel { background: #d50000; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 900; cursor: pointer; }

        .bottom-section {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        .card-glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 12px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            font-size: 22px;
            color: #475569;
            margin: 3px 0;
        }

        .star:hover, .star.active { color: #ffe600; text-shadow: 0 0 10px rgba(255, 230, 0, 0.6); }

        @media (max-width: 600px) {
            .time-digits { font-size: 32px; }
            .event-title { font-size: 20px; }
            .creator-bar { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="creator-bar">
        <span>CREADOR: <strong>GREGORY</strong></span>
        <span>CÓDIGO: <span class="code">GREGORY9797</span></span>
        <div class="social-buttons">
            <a href="https://www.instagram.com/ghregory97?igsh=eHlobWR5Yzc2MnNw" target="_blank" class="btn-social instagram-btn">📸 Instagram</a>
            <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=lordkellvnzl@gmail.com&item_name=Apoyo+a+Gregory+Tycoon" target="_blank" class="btn-social paypal-btn">💙 Donar</a>
        </div>
    </div>

    <!-- Pestañas originales con Beskar, Mítico, Galáctico y agregada la nueva pestaña a un lado -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('beskar')">🛡️ PLANO BESKAR</button>
        <button class="tab-btn" onclick="switchTab('mitico')">⚡ PLANO MÍTICO</button>
        <button class="tab-btn" onclick="switchTab('galactico')">🌌 EVENTO GALÁCTICO</button>
        <button class="tab-btn" onclick="switchTab('proximo')">🚀 PRÓXIMO EVENTO</button>
    </div>

    <div class="event-container">
        <div class="event-banner">
            <div class="event-subtitle">— TEMPORADA STAR WARS —</div>
            <div id="banner-title" class="event-title">PLANO BESKAR</div>
        </div>

        <div class="countdown-box">
            <div id="phase-indicator">⏳ Tiempo para el Evento</div>
            <div id="time-display" class="time-digits">00:00:00:00</div>
            <div class="time-labels">
                <span>DÍAS</span>
                <span>HORAS</span>
                <span>MINUTOS</span>
                <span>SEGUNDOS</span>
            </div>
            
            <button class="btn-config" onclick="requestAdmin()">⚙️ Configurar Tiempos</button>

            <div id="admin-panel" class="admin-panel">
                <div style="font-size: 11px; color: #00d2ff; font-weight: 800;">FASE 1: TIEMPO HASTA EL EVENTO</div>
                <div class="inputs-row">
                    <label>D: <input type="number" id="in-wait-d" min="0" value="1"></label>
                    <label>H: <input type="number" id="in-wait-h" min="0" max="23" value="0"></label>
                    <label>M: <input type="number" id="in-wait-m" min="0" max="59" value="0"></label>
                </div>
                <div style="font-size: 11px; color: #ffe600; font-weight: 800; border-top: 1px solid #334155; padding-top: 8px;">FASE 2: DURACIÓN ACTIVA</div>
                <div class="inputs-row">
                    <label>H: <input type="number" id="in-dur-h" min="0" max="23" value="0"></label>
                    <label>M: <input type="number" id="in-dur-m" min="0" max="59" value="15"></label>
                </div>
                <div class="admin-btns">
                    <button class="btn-save" onclick="saveCustomTimes()">💾 Guardar y Sincronizar</button>
                    <button class="btn-cancel" onclick="closeAdmin()">❌ Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="card-glass">
            <div style="font-size: 13px; font-weight: 900; color: #ffe600;">⭐ CALIFICA LA PÁGINA ⭐</div>
            <div class="stars">
                <span class="star" onclick="ratePage(1)">★</span>
                <span class="star" onclick="ratePage(2)">★</span>
                <span class="star" onclick="ratePage(3)">★</span>
                <span class="star" onclick="ratePage(4)">★</span>
                <span class="star" onclick="ratePage(5)">★</span>
            </div>
            <div id="rating-stats" style="font-size: 12px; font-weight: 800; color: #00d2ff;">Cargando opiniones...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const ADMIN_PIN = "HOLAGORDIS69KELL$$"; 

        const firebaseConfig = {
            apiKey: "AIzaSyDSQtr6xQONdpcK7HQDe_TIVCm6yBg4C3E",
            authDomain: "starwars-timers.firebaseapp.com",
            projectId: "starwars-timers",
            storageBucket: "starwars-timers.firebasestorage.app",
            messagingSenderId: "823447387092",
            appId: "1:823447387092:web:c98ee916a04d00eee83441"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let serverOffset = 0;
        let currentTab = 'beskar';
        
        let eventData = {
            waitDuration: 86400,
            eventDuration: 900,
            cycleStartTime: Date.now()
        };

        const tabNames = {
            'beskar': 'PLANO BESKAR',
            'mitico': 'PLANO MÍTICO',
            'galactico': 'EVENTO GALÁCTICO',
            'proximo': 'PRÓXIMO EVENTO'
        };

        db.collection(".info").doc("serverTime").set({ now: firebase.firestore.FieldValue.serverTimestamp() })
            .then(() => {
                db.collection(".info").doc("serverTime").get().then((doc) => {
                    if (doc.exists && doc.data().now) {
                        serverOffset = doc.data().now.toMillis() - Date.now();
                    }
                });
            }).catch(() => {});

        function switchTab(tabKey) {
            currentTab = tabKey;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('banner-title').innerText = tabNames[tabKey];

            loadTabFirestore();
        }

        function loadTabFirestore() {
            db.collection("timers").doc(currentTab).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    eventData.waitDuration = data.waitDuration || 86400;
                    eventData.eventDuration = data.eventDuration || 900;
                    eventData.cycleStartTime = data.cycleStartTime || Date.now();
                } else {
                    const now = Date.now();
                    db.collection("timers").doc(currentTab).set({
                        waitDuration: 86400,
                        eventDuration: 900,
                        cycleStartTime: now
                    });
                }
            });
        }

        loadTabFirestore();

        function updateCountdown() {
            const now = Date.now() + serverOffset;
            const elapsedTotalSeconds = Math.floor((now - eventData.cycleStartTime) / 1000);

            const totalCycleTime = eventData.waitDuration + eventData.eventDuration;
            const currentCycleTime = elapsedTotalSeconds % totalCycleTime;

            let remainingSeconds = 0;
            const indicator = document.getElementById('phase-indicator');
            const box = document.querySelector('.countdown-box');

            if (currentCycleTime < eventData.waitDuration) {
                remainingSeconds = eventData.waitDuration - currentCycleTime;
                indicator.innerText = "⏳ Tiempo para el Evento";
                indicator.style.color = "#00d2ff";
                indicator.style.borderColor = "rgba(0, 210, 255, 0.3)";
                indicator.style.background = "rgba(0, 210, 255, 0.1)";
                box.style.borderColor = "#ffe600";
                box.style.boxShadow = "0 0 40px rgba(255, 230, 0, 0.4)";
            } else {
                remainingSeconds = totalCycleTime - currentCycleTime;
                indicator.innerText = "🔴 ¡EN DIRECTO / ACTIVO!";
                indicator.style.color = "#ff2a2a";
                indicator.style.borderColor = "rgba(255, 42, 42, 0.5)";
                indicator.style.background = "rgba(255, 42, 42, 0.15)";
                box.style.borderColor = "#ff2a2a";
                box.style.boxShadow = "0 0 40px rgba(255, 42, 42, 0.5)";
            }

            const days = Math.floor(remainingSeconds / 86400);
            const hours = Math.floor((remainingSeconds % 86400) / 3600);
            const minutes = Math.floor((remainingSeconds % 3600) / 60);
            const seconds = remainingSeconds % 60;

            const displayStr = 
                String(days).padStart(2, '0') + ":" +
                String(hours).padStart(2, '0') + ":" +
                String(minutes).padStart(2, '0') + ":" +
                String(seconds).padStart(2, '0');

            document.getElementById('time-display').innerText = displayStr;
        }

        function requestAdmin() {
            const pin = prompt("Ingresa la clave de administrador:");
            if (pin !== ADMIN_PIN) {
                alert("Clave incorrecta.");
                return;
            }
            document.getElementById('admin-panel').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('active');
        }

        function saveCustomTimes() {
            const waitD = parseInt(document.getElementById('in-wait-d').value) || 0;
            const waitH = parseInt(document.getElementById('in-wait-h').value) || 0;
            const waitM = parseInt(document.getElementById('in-wait-m').value) || 0;

            const durH = parseInt(document.getElementById('in-dur-h').value) || 0;
            const durM = parseInt(document.getElementById('in-dur-m').value) || 0;

            const waitTotalSec = (waitD * 86400) + (waitH * 3600) + (waitM * 60);
            const durTotalSec = (durH * 3600) + (durM * 60);

            const currentServerTime = Date.now() + serverOffset;

            db.collection("timers").doc(currentTab).set({
                waitDuration: waitTotalSec,
                eventDuration: durTotalSec > 0 ? durTotalSec : 900,
                cycleStartTime: currentServerTime
            }, { merge: true }).then(() => {
                closeAdmin();
                alert(`¡Configuración guardada para ${tabNames[currentTab]}!`);
            });
        }

        function ratePage(stars) {
            db.collection("ratings").add({
                rating: stars,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert(`¡Gracias por calificar con ${stars} estrellas! ⭐`);
            });
        }

        db.collection("ratings").onSnapshot((snapshot) => {
            if (snapshot.empty) {
                document.getElementById('rating-stats').innerText = "Sé el primero en calificar ⭐";
                return;
            }
            let total = 0, positive = 0;
            snapshot.forEach(doc => {
                total++;
                if (doc.data().rating >= 4) positive++;
            });
            const pct = Math.round((positive / total) * 100);
            document.getElementById('rating-stats').innerText = `✨ ${pct}% de aprobación positiva (${total} votos)`;
        });

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
