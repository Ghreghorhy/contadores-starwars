<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Tycoon Star Wars - Timers</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #080a0f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
            user-select: none;
        }

        /* Barra Superior del Creador */
        .creator-bar {
            width: 100%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .creator-bar strong {
            color: #00d2ff;
        }

        .creator-bar .code {
            color: #ff0055;
            background: rgba(255, 0, 85, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #ff0055;
        }

        /* Banner de Bienvenida */
        .welcome-title {
            font-size: 18px;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ffe600, #ff0055, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 230, 0, 0.2);
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }

        .timer-box {
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card-info {
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .time-display {
            font-size: 26px;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 4px;
            display: none;
            color: #ff4757;
            text-transform: uppercase;
        }

        /* Estilos por categoría */
        .beskar { 
            background: rgba(212, 175, 55, 0.12); 
            border: 2px solid #ffd700; 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
            color: #fff8dc;
        }
        .mythic { 
            background: rgba(220, 20, 60, 0.12); 
            border: 2px solid #ff1493; 
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.15);
            color: #ffe4e1;
        }
        .galactic { 
            background: rgba(138, 43, 226, 0.12); 
            border: 2px solid #a855f7; 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
            color: #f3e8ff;
        }

        /* Alerta visual cuando respawnea */
        .ready-alert {
            animation: readyPulse 0.8s infinite alternate !important;
        }

        @keyframes readyPulse {
            0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; transform: scale(1); }
            100% { border-color: #ffffff; box-shadow: 0 0 35px #ff0000; transform: scale(1.02); }
        }

        button {
            background: #1e293b;
            color: #fff;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        button:hover { 
            background: #ffffff; 
            color: #000000;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Barra de Creador -->
    <div class="creator-bar">
        <span>CREADOR: <strong>GREGORY</strong></span>
        <span>CÓDIGO FORTNITE: <span class="code">GREGORY9797</span></span>
    </div>

    <!-- Título de Bienvenida -->
    <div class="welcome-title">
        ¡BIENVENIDO ANDROID TYCOON STAR WARS!
    </div>

    <div class="container">
        <!-- Beskar -->
        <div id="box-beskar" class="timer-box beskar">
            <div class="card-info">
                <div class="card-title">Beskar</div>
                <div id="beskar-display" class="time-display">00:15:00</div>
                <div id="beskar-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <button onclick="resetTimer('beskar', 900)">Reset</button>
        </div>

        <!-- Mítico -->
        <div id="box-mythic" class="timer-box mythic">
            <div class="card-info">
                <div class="card-title">Mítico</div>
                <div id="mythic-display" class="time-display">01:00:00</div>
                <div id="mythic-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <button onclick="resetTimer('mythic', 3600)">Reset</button>
        </div>

        <!-- Galáctico -->
        <div id="box-galactic" class="timer-box galactic">
            <div class="card-info">
                <div class="card-title">Galáctico</div>
                <div id="galactic-display" class="time-display">01:00:00</div>
                <div id="galactic-status" class="status-badge">¡RESPAWN LISTO!</div>
            </div>
            <button onclick="resetTimer('galactic', 3600)">Reset</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const ADMIN_PIN = "1234"; 

        const firebaseConfig = {
            apiKey: "AIzaSyDSQtr6xQONdpcK7HQDe_TIVCm6yBg4C3E",
            authDomain: "starwars-timers.firebaseapp.com",
            projectId: "starwars-timers",
            storageBucket: "starwars-timers.firebasestorage.app",
            messagingSenderId: "823447387092",
            appId: "1:823447387092:web:c98ee916a04d00eee83441"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let serverOffset = 0;

        db.collection(".info").doc("serverTime").set({ now: firebase.firestore.FieldValue.serverTimestamp() })
            .then(() => {
                db.collection(".info").doc("serverTime").get().then((doc) => {
                    if (doc.exists && doc.data().now) {
                        const serverTime = doc.data().now.toMillis();
                        serverOffset = serverTime - Date.now();
                    }
                });
            }).catch(() => {});

        const targetTimes = {
            beskar: 0,
            mythic: 0,
            galactic: 0
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 880) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function formatTime(seconds) {
            if (seconds <= 0) return "00:00:00";
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateDisplay() {
            const now = Date.now() + serverOffset;

            for (let key in targetTimes) {
                const display = document.getElementById(`${key}-display`);
                const box = document.getElementById(`box-${key}`);
                const status = document.getElementById(`${key}-status`);
                
                if (targetTimes[key] === 0) continue;

                const remainingSeconds = Math.max(0, Math.ceil((targetTimes[key] - now) / 1000));
                display.innerText = formatTime(remainingSeconds);

                if (remainingSeconds === 0) {
                    box.classList.add('ready-alert');
                    status.style.display = 'block';
                } else if (remainingSeconds <= 5) {
                    playBeep(600);
                    box.classList.remove('ready-alert');
                    status.style.display = 'none';
                } else {
                    box.classList.remove('ready-alert');
                    status.style.display = 'none';
                }
            }
        }

        db.collection("timers").doc("starwars").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.beskar) targetTimes.beskar = data.beskar;
                if (data.mythic) targetTimes.mythic = data.mythic;
                if (data.galactic) targetTimes.galactic = data.galactic;
                updateDisplay();
            }
        });

        function resetTimer(type, secondsDuration) {
            const userPin = prompt("Ingresa el PIN de administrador:");
            if (userPin !== ADMIN_PIN) {
                alert("PIN incorrecto.");
                return;
            }

            const currentServerTime = Date.now() + serverOffset;
            const targetTimestamp = currentServerTime + (secondsDuration * 1000);
            
            db.collection("timers").doc("starwars").set({
                [type]: targetTimestamp
            }, { merge: true });
        }

        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
